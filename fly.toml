# fly.toml app configuration file generated for paperslip-memo
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paperslip-memo'
primary_region = 'iad'

[build]
  dockerfile = 'scripts/Dockerfile'

[env]
  MEMOS_PORT = '5230'

[[mounts]]
  source = 'memos_data'
  destination = '/var/opt/memos'

[http_service]
  internal_port = 5230
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  port = 5230
  timeout = "5s"
  type = "http"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
